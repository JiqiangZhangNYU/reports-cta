// ── Fetch helper (per-factor only, with content-hash cache busting) ──────────
async function fetchJSON(url) {
  if (dataCache[url]) return dataCache[url];
  const hash = FILE_HASHES[url] || String(Date.now());
  const sep = url.includes('?') ? '&' : '?';
  const fullUrl = url + sep + 'v=' + hash;
  for (let i = 0; i <= 2; i++) {
    try {
      const ac = new AbortController();
      const tid = setTimeout(() => ac.abort(), 8000);
      const r = await fetch(fullUrl, {signal: ac.signal});
      clearTimeout(tid);
      if (r.ok) { const d = await r.json(); dataCache[url] = d; return d; }
      if (r.status === 404) throw new Error(`fetch ${url} → 404`);
    } catch(e) {
      if (e.name !== 'AbortError' && e.message.includes('404')) throw e;
    }
    if (i < 2) await new Promise(r => setTimeout(r, 500 * (i + 1)));
  }
  throw new Error(`fetch ${url} failed after retries`);
}

let currentSort = 'sharpe';
function buildSidebar() {
  const sorted = [...metaFactors];
  if (currentSort === 'time') sorted.sort((a, b) => a.key.localeCompare(b.key));
  else sorted.sort((a, b) => (b.sharpe ?? -999) - (a.sharpe ?? -999));
  const list = document.getElementById('strat-nav-list');
  list.innerHTML = '';
  const activeKey = document.querySelector('.strat-nav.active')?.dataset?.key;
  for (const f of sorted) {
    const el = document.createElement('div');
    el.className = 'strat-nav' + (f.key === activeKey ? ' active' : '');
    el.dataset.key = f.key;
    const sh = f.sharpe != null ? f.sharpe.toFixed(2) : '–';

// ── Canvas chart drawing (adapted from /mnt/Data/jiqiang/dashboard/gen.py) ────
const PAD = { top: 14, bottom: 36, left: 50, right: 12 };

function drawChart(id, hoverCol, highlightIdx) {
  const st = chartState[id];
  if (!st) return;
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const { dates, series, hidden } = st;
  const N = dates.length;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top  - PAD.bottom;

  // y range
  let yMin = Infinity, yMax = -Infinity;
  series.forEach((s, si) => {
    if (hidden.has(si)) return;
    for (const v of s.data) { if (v != null) { if (v < yMin) yMin = v; if (v > yMax) yMax = v; } }
  });
  if (!isFinite(yMin)) { yMin = 0; yMax = 2; }
  if (yMin === yMax) { yMin -= 0.1; yMax += 0.1; }
  const yPad = (yMax - yMin) * 0.08;
  yMin -= yPad; yMax += yPad;

  const xOf = i => PAD.left + plotW * i / Math.max(N - 1, 1);
  const yOf = v => PAD.top  + plotH * (1 - (v - yMin) / (yMax - yMin));

  // background + grid
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#eff2f5'; ctx.lineWidth = 0.5;
  const yTicks = 5;
  for (let i = 0; i <= yTicks; i++) {
    const y = PAD.top + plotH * i / yTicks;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
  }
  // zero line
  if (yMin < 1 && yMax > 1) {
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(PAD.left, yOf(1)); ctx.lineTo(W - PAD.right, yOf(1)); ctx.stroke();
    ctx.setLineDash([]);
  }

  // draw lines
  st.paths = [];
  series.forEach((s, si) => {
    if (hidden.has(si)) { st.paths.push(null); return; }
    const isHL  = (highlightIdx === si);
    const isEW  = s.key === '__ew__';
    const isSW  = s.key === '__sw__';
    const isTW  = s.key === '__tw__';
    const isComposite = isEW || isSW || isTW;
    const isFade = highlightIdx != null && highlightIdx >= 0 && !isHL;
    ctx.strokeStyle = s.color;
    ctx.lineWidth   = isHL ? 3.5 : (isComposite ? 2.5 : 1.5);
    ctx.globalAlpha = isFade ? 0.06 : (isComposite ? 0.95 : 0.5);
    if (isComposite) { ctx.setLineDash([5, 4]); } else { ctx.setLineDash([]); }
    const pts = [];
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < N; i++) {
      if (s.data[i] == null) continue;
      const x = xOf(i), y = yOf(s.data[i]);
      pts.push({ x, y, i });
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1.0; ctx.setLineDash([]);
    st.paths.push(pts);
  });

  // y-axis labels
  ctx.fillStyle = '#888'; ctx.font = '10px -apple-system, sans-serif'; ctx.textAlign = 'right';
  for (let i = 0; i <= yTicks; i++) {
    const val = yMin + (yMax - yMin) * (1 - i / yTicks);
    ctx.fillText(val.toFixed(2), PAD.left - 4, PAD.top + plotH * i / yTicks + 4);
  }
  // x-axis labels — show years for long series (>3yr), month-day for short
  ctx.fillStyle = '#888'; ctx.textAlign = 'center';
  const spanYears = N > 0 ? (new Date(dates[N-1]) - new Date(dates[0])) / (365.25*86400000) : 0;
  if (spanYears > 3) {
    // year-based ticks: one label per Jan-1
    let lastYear = null;
    for (let i = 0; i < N; i++) {
      const yr = dates[i].slice(0, 4);
      if (yr !== lastYear) {
        lastYear = yr;
        ctx.fillText(yr, xOf(i), H - PAD.bottom + 16);
      }
    }
  } else {
    const xStep = Math.max(1, Math.floor(N / 7));
    for (let i = 0; i < N; i += xStep) {
      ctx.save(); ctx.translate(xOf(i), H - PAD.bottom + 14); ctx.rotate(-0.4);
      ctx.fillText(dates[i].slice(5), 0, 0); ctx.restore();
    }
    ctx.save(); ctx.translate(xOf(N - 1), H - PAD.bottom + 14); ctx.rotate(-0.4);
    ctx.fillText(dates[N - 1].slice(5), 0, 0); ctx.restore();
  }

  // crosshair + dots
  if (hoverCol != null && hoverCol >= 0 && hoverCol < N) {
    const hx = xOf(hoverCol);
    ctx.strokeStyle = '#999'; ctx.lineWidth = 0.8; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(hx, PAD.top); ctx.lineTo(hx, H - PAD.bottom); ctx.stroke();
    ctx.setLineDash([]);
    series.forEach((s, si) => {
      if (hidden.has(si) || s.data[hoverCol] == null) return;
      ctx.fillStyle = s.color;
      ctx.beginPath(); ctx.arc(hx, yOf(s.data[hoverCol]), 4.5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(hx, yOf(s.data[hoverCol]), 4.5, 0, Math.PI * 2); ctx.stroke();
    });
  }
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
function getOrCreateTooltip(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  const wrap = canvas.parentElement;
  let tip = wrap.querySelector('.chart-tooltip');
  if (!tip) {
    tip = document.createElement('div');
    tip.className = 'chart-tooltip';
    wrap.style.position = 'relative';
    wrap.appendChild(tip);
  }
  return tip;
}

function colFromMouseX(canvasId, mx) {
  const st = chartState[canvasId];
  if (!st) return -1;
  const canvas = document.getElementById(canvasId);
  if (!canvas) return -1;
  const N = st.dates.length;
  const W = canvas.clientWidth;
  const plotW = W - PAD.left - PAD.right;
  const col = Math.round((mx - PAD.left) / plotW * (N - 1));
  if (col < 0 || col >= N || mx < PAD.left || mx > W - PAD.right) return -1;
  return col;
}

function tooltipHtml(canvasId, col) {
  const st = chartState[canvasId];
  if (!st || col < 0) return null;
  const { dates, series, hidden } = st;
  const rows = [];
  series.forEach((s, si) => {
    if (hidden.has(si) || s.data[col] == null) return;
    rows.push({ name: s.name, val: s.data[col], color: s.color });
  });
  rows.sort((a, b) => b.val - a.val);
  if (!rows.length) return null;
  let html = `<div class="tt-date">${dates[col]}</div>`;
  for (const r of rows)
    html += `<div class="tt-row"><span class="tt-swatch" style="background:${r.color}"></span><span class="tt-name">${r.name}</span><span class="tt-val">${r.val.toFixed(3)}</span></div>`;
  return html;
}

function positionTooltip(tip, canvas, mx, my) {
  const wrap = canvas.parentElement;
  const cr = canvas.getBoundingClientRect();
  const wr = wrap.getBoundingClientRect();
  const tx = mx + cr.left - wr.left;
  const ty = my + cr.top  - wr.top;
  tip.style.top = Math.max(0, ty - 20) + 'px';
  if (tx + 220 < wr.width) { tip.style.left = (tx + 16) + 'px'; tip.style.right = 'auto'; }
  else                      { tip.style.left = 'auto'; tip.style.right = (wr.width - tx + 16) + 'px'; }
}

function bindChartEvents(canvasId, period) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const col = colFromMouseX(canvasId, mx);
    const tip = getOrCreateTooltip(canvasId);
    if (tip && !tip.classList.contains('pinned')) {
      const html = tooltipHtml(canvasId, col);
      if (html) { tip.innerHTML = html; tip.style.display = 'block'; positionTooltip(tip, canvas, mx, my); }
      else { tip.style.display = 'none'; }
    }
    drawChart(canvasId, col >= 0 ? col : null);
  });
  canvas.addEventListener('mouseleave', () => {
    const tip = getOrCreateTooltip(canvasId);
    if (tip && !tip.classList.contains('pinned')) tip.style.display = 'none';
    drawChart(canvasId, null);
  });
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const col = colFromMouseX(canvasId, e.clientX - rect.left);
    const tip = getOrCreateTooltip(canvasId);
    if (!tip) return;
    if (tip.classList.contains('pinned')) {
      tip.classList.remove('pinned'); tip.style.display = 'none'; drawChart(canvasId, null);
    } else if (col >= 0) {
      const html = tooltipHtml(canvasId, col);
      if (html) {
        tip.innerHTML = html; tip.style.display = 'block';
        positionTooltip(tip, canvas, e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
        tip.classList.add('pinned');
      }
    }
  });
}

      color: colorMap[f.key],
      data: d.factors[f.key] || [],
      _sharpe: ps[f.key] ?? -999,
    }))
  const ewLabel = d.ew_sharpe != null ? `(${d.ew_sharpe.toFixed(2)}) 等权组合` : '等权组合';
  series.push({ name: ewLabel, key: '__ew__', color: EW_COLOR, data: d.equal_weight, _sharpe: d.ew_sharpe ?? -999 });
  if (d.sharpe_weight) {
    const swLabel = d.sw_sharpe != null ? `(${d.sw_sharpe.toFixed(2)}) Sharpe加权` : 'Sharpe加权';
    series.push({ name: swLabel, key: '__sw__', color: SW_COLOR, data: d.sharpe_weight, _sharpe: d.sw_sharpe ?? -999 });
  }
  if (d.type_weight) {
    const twLabel = d.tw_sharpe != null ? `(${d.tw_sharpe.toFixed(2)}) 类型加权` : '类型加权';
    series.push({ name: twLabel, key: '__tw__', color: TW_COLOR, data: d.type_weight, _sharpe: d.tw_sharpe ?? -999 });
  }
  // Sort: composites first (fixed order), then individual factors by Sharpe
  const compositeKeys = new Set(['__ew__', '__sw__', '__tw__']);
  const composites = series.filter(s => compositeKeys.has(s.key));
  const individuals = series.filter(s => !compositeKeys.has(s.key));
  individuals.sort((a, b) => b._sharpe - a._sharpe);
  series.length = 0;
  series.push(...composites, ...individuals);

  chartState[canvasId] = {
    dates: d.dates, series, hidden: new Set(), paths: [],
    selSet: chartSel[period], period,
  };
  bindChartEvents(canvasId, period);
  drawChart(canvasId, null);

  window.addEventListener('resize', () => drawChart(canvasId, null));
}

function buildLegend(period) {
  const wrap = document.getElementById(`legend-${period}`);
  if (!wrap) return;
  wrap.innerHTML = '';
  const canvasId = `chart-${period}`;
  const st = chartState[canvasId];
  if (!st) return;

  st.series.forEach((s, si) => {
    const el = document.createElement('div');
    el.className = 'leg-item';
    el.style.color = s.color;
    const dot = document.createElement('span');
    if (s.key === '__ew__') dot.className = 'leg-ew-line';
    else { dot.className = 'leg-dot'; dot.style.background = s.color; }
    const lbl = document.createElement('span');
    lbl.className = 'leg-label'; lbl.textContent = s.name;
    el.appendChild(dot); el.appendChild(lbl);

    el.addEventListener('mouseenter', () => {
      if (st.selSet.size > 0 && !st.selSet.has(si)) return;
      drawChart(canvasId, null, si);
      el.classList.add('lit');
      wrap.querySelectorAll('.leg-item').forEach((e, i) => {
        if (i !== si && (st.selSet.size === 0 || st.selSet.has(i))) e.classList.add('dim');
      });
    });
    el.addEventListener('mouseleave', () => {
      if (st.selSet.size > 0 && !st.selSet.has(si)) return;
      drawChart(canvasId, null, st.selSet.size === 1 ? [...st.selSet][0] : null);
      wrap.querySelectorAll('.leg-item').forEach(e => e.classList.remove('lit', 'dim'));
      if (st.selSet.size > 0) refreshLegendSel(period);
    });
    el.addEventListener('click', () => {
      if (st.selSet.has(si)) st.selSet.delete(si); else st.selSet.add(si);
      // Update hidden set: when selSet has items, hide everything not selected
      st.hidden.clear();
      if (st.selSet.size > 0) {
        st.series.forEach((_, i) => { if (!st.selSet.has(i)) st.hidden.add(i); });
      }
      refreshLegendSel(period);
      drawChart(canvasId, null, st.selSet.size === 1 ? [...st.selSet][0] : null);
    });
    wrap.appendChild(el);
  });
}

function refreshLegendSel(period) {
  const canvasId = `chart-${period}`;
  const st = chartState[canvasId];
  if (!st) return;
  const wrap = document.getElementById(`legend-${period}`);
  const items = wrap.querySelectorAll('.leg-item');
  items.forEach((el, i) => {
    const isSel = st.selSet.has(i);
    el.classList.toggle('sel', isSel);
    el.classList.toggle('dim', st.selSet.size > 0 && !isSel);
    el.classList.remove('lit');
    el.style.background  = isSel ? hexAlpha(st.series[i].color, 0.1) : '';
    el.style.borderColor = isSel ? hexAlpha(st.series[i].color, 0.5) : 'transparent';
  });
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Strategy detail ───────────────────────────────────────────────────────────
let _stratResizeHandler = null;
async function buildStratDetail(key) {
  const meta = metaFactors.find(f => f.key === key) || {};

  // 1. Immediately clear old content + show loading
  document.getElementById('strat-title').textContent = meta.display_name || key;
  const canvas = document.getElementById('strat-chart');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1);
    canvas.height = canvas.clientHeight * (window.devicePixelRatio || 1);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  document.getElementById('strat-summary').innerHTML = '<div class="loading">加载中…</div>';
  // Scroll back to top
  document.getElementById('view-strategy').scrollTop = 0;

  // 2. Stats cards (from meta, instant)
  const s = meta;
  const statsEl = document.getElementById('strat-stats');
  const items = [
    ['Sharpe',   s.sharpe   != null ? s.sharpe.toFixed(2)   : '–'],
    ['年化收益',   s.ann_ret  != null ? s.ann_ret + '%'        : '–'],
    ['年化波动',   s.ann_vol  != null ? s.ann_vol + '%'        : '–'],
    ['最大回撤',   s.max_dd   != null ? s.max_dd.toFixed(3)   : '–'],
    ['日胜率',    s.win_rate != null ? s.win_rate + '%'       : '–'],
    ['换手率',    s.turnover != null ? s.turnover + '%'       : '–'],
    ['NAV 终值',  s.final_nav != null ? s.final_nav.toFixed(2) : '–'],
  ];
  statsEl.innerHTML = items.map(([label, val]) =>
    `<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value">${val}</div></div>`
  ).join('');

  // 3. Fetch data then render chart + summary together
  try {
    const d = await fetchJSON(`data/${encodeURIComponent(key)}.json`);
    const color = colorMap[key] || '#4285f4';
    chartState['strat-chart'] = {
      dates: INLINE_DATES,
      series: [{ name: d.display_name, key, color, data: d.nav }],
      hidden: new Set(), paths: [],
    };
    drawChart('strat-chart', null);
    if (_stratResizeHandler) window.removeEventListener('resize', _stratResizeHandler);
    _stratResizeHandler = () => drawChart('strat-chart', null);
    window.addEventListener('resize', _stratResizeHandler);
    bindChartEvents('strat-chart', null);

    // summary — pre-rendered server-side, just inject + render KaTeX
    const summaryEl = document.getElementById('strat-summary');
    summaryEl.innerHTML = d.summary_html || '';
    renderMathTex(summaryEl);
  } catch(e) {
    console.error(e);
    document.getElementById('strat-summary').innerHTML = '<div class="loading">加载失败</div>';
  }
}

// ── KaTeX lazy-load + render ─────────────────────────────────────────────────
let _katexLoading = null;
function loadKaTeX() {
  if (typeof katex !== 'undefined') return Promise.resolve();
  if (_katexLoading) return _katexLoading;
  _katexLoading = new Promise(resolve => {
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css';
    document.head.appendChild(link);
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js';
    script.onload = resolve;
    document.head.appendChild(script);
  });
  return _katexLoading;
}

function renderMathTex(root) {
  const els = root.querySelectorAll('.math-tex');
  if (!els.length) return;
  loadKaTeX().then(() => {
    els.forEach(el => {
      const display = el.classList.contains('math-display');
      try { el.innerHTML = katex.renderToString(el.textContent.trim(), {displayMode: display, throwOnError: false}); }
      catch(e) { /* keep raw tex as fallback */ }
    });
  });
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
