<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>因子库 OOS 展示</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  background: #f0f2f5; color: #1a1a2e; overflow: hidden; }

#root { display: flex; height: 100vh; }

/* ── Sidebar ── */
#sidebar {
  flex: 0 0 230px; display: flex; flex-direction: column;
  background: #1e2a3a; color: #c8d6e8; overflow-y: auto;
  border-right: 1px solid #0d1b2a;
}
#sb-header {
  padding: 14px 16px 10px; font-size: 13px; font-weight: 700;
  color: #e2eaf3; border-bottom: 1px solid #2d3f52; flex-shrink: 0;
}
#sb-header small { display: block; font-size: 10px; font-weight: 400; color: #6b89a8; margin-top: 2px; }

.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 16px; cursor: pointer; font-size: 13px;
  border-left: 3px solid transparent;
  color: #9ab4ce; transition: background 0.1s;
}
.nav-item:hover { background: #253547; color: #d6e4f0; }
.nav-item.active { background: #1f3a52; border-left-color: #4a9ede; color: #e2eaf3; font-weight: 600; }

.nav-divider { height: 1px; background: #2d3f52; margin: 6px 0; flex-shrink: 0; }
.nav-section { padding: 6px 16px 3px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px; color: #4a6a88; flex-shrink: 0; }

.strat-nav {
  padding: 7px 14px 7px 19px; cursor: pointer; font-size: 12px;
  border-left: 3px solid transparent;
  color: #7a9ab8; display: flex; justify-content: space-between; align-items: baseline; gap: 4px;
  transition: background 0.1s;
}
.strat-nav:hover { background: #253547; color: #bdd3e8; }
.strat-nav.active { background: #1a3349; border-left-color: #4a9ede; color: #d6e8f8; font-weight: 600; }
.strat-nav .sn-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11.5px; }
.strat-nav .sn-sharpe { font-size: 10.5px; color: #4a7a9e; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.strat-nav.active .sn-sharpe { color: #6aacde; }

/* ── Main content ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#view-strategy { overflow-y: auto !important; }

/* ── Comparison view ── */
#charts-row {
  flex: 1; overflow-y: auto; padding: 16px 24px 0; display: flex; flex-direction: column; gap: 20px;
}
.chart-wrap {
  display: flex; flex-direction: column; flex-shrink: 0;
  background: #fff; border-radius: 12px; padding: 16px 20px 8px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.chart-period-label {
  font-size: 14px; font-weight: 700; color: #3a5a7a;
  letter-spacing: 0.3px; margin-bottom: 8px; padding: 0 4px;
}
.chart-canvas-wrap { height: 380px; min-height: 320px; flex-shrink: 0; position: relative; }
.chart-canvas { width: 100%; height: 100%; display: block; border-radius: 8px; border: 1px solid #eee; cursor: crosshair; }

/* tooltip */
.chart-tooltip {
  position: absolute; pointer-events: none;
  background: rgba(255,255,255,0.97); border: 1px solid #c0c8d0; border-radius: 8px;
  padding: 10px 14px; font-size: 12.5px; box-shadow: 0 4px 16px rgba(0,0,0,0.14);
  z-index: 10; max-height: 60vh; overflow-y: auto; scrollbar-width: thin;
  min-width: 180px;
}
.chart-tooltip.pinned { pointer-events: auto; border-color: #4a9ede; }
.tt-date { font-weight: 700; margin-bottom: 6px; color: #1a2a3a; font-size: 13px; }
.tt-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; white-space: nowrap; }
.tt-swatch { width: 12px; height: 3px; border-radius: 2px; flex-shrink: 0; }
.tt-name { flex: 1; color: #444; }
.tt-val { font-weight: 700; font-variant-numeric: tabular-nums; color: #1a2a3a; }

/* ── Legend ── */
.chart-legend {
  flex: 0 0 auto; padding: 8px 12px 10px;
  display: flex; flex-wrap: wrap; gap: 6px 12px;
  border-top: 1px solid #e8ecf0; max-height: 100px; overflow-y: auto;
}
.leg-item {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px 4px 8px; border-radius: 20px; cursor: pointer;
  border: 1.5px solid transparent; transition: opacity 0.12s, border-color 0.12s;
  opacity: 0.4; user-select: none; white-space: nowrap;
}
.leg-item:hover { opacity: 0.9; }
.leg-item.lit { opacity: 0.9; }
.leg-item.sel { opacity: 1; font-weight: 600; }
.leg-item.dim { opacity: 0.12; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.leg-ew-line { width: 20px; height: 0; flex-shrink: 0; border-top: 2.5px dashed currentColor; }
.leg-label { font-size: 12px; color: #333; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }

/* ── Strategy detail ── */
#view-strategy { padding: 0; background: #f4f6f9; }
#strat-top { flex: 0 0 auto; background: #fff; border-bottom: 1px solid #e4e8ed; padding: 16px 24px 12px; }
#strat-title { font-size: 17px; font-weight: 700; color: #1a2a3a; margin-bottom: 12px; }
#strat-stats { display: flex; gap: 12px; flex-wrap: wrap; }
.stat-card { background: #f4f7fb; border: 1px solid #dde3eb; border-radius: 10px; padding: 10px 16px; min-width: 95px; }
.stat-label { font-size: 10px; font-weight: 700; color: #7a9ab8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.stat-value { font-size: 20px; font-weight: 700; color: #1e3a5a; font-variant-numeric: tabular-nums; }
#strat-chart-wrap { height: 340px; min-height: 340px; flex-shrink: 0; background: #fff; padding: 12px 20px 8px; position: relative; border-bottom: 1px solid #e8ecf0; }
#strat-chart { width: 100%; height: 100%; display: block; cursor: crosshair; border-radius: 8px; border: 1px solid #eee; }
#strat-summary-wrap { flex-shrink: 0; padding: 16px 24px 40px; }
#strat-summary { font-size: 13px; line-height: 1.7; color: #333; max-width: 900px; }
#strat-summary h1 { font-size: 16px; margin-top: 0; color: #1a2a3a; }
#strat-summary h2 { font-size: 14px; color: #2a4a6a; border-bottom: 1px solid #e0e8f0; padding-bottom: 4px; margin-top: 20px; }
#strat-summary h3 { font-size: 13px; color: #3a5a7a; }
#strat-summary table { border-collapse: collapse; width: 100%; font-size: 12px; margin: 8px 0; }
#strat-summary th, #strat-summary td { border: 1px solid #dde; padding: 5px 9px; }
#strat-summary th { background: #f2f5f8; font-weight: 600; }
#strat-summary code { background: #f0f2f5; padding: 1px 5px; border-radius: 3px; font-size: 11.5px; font-family: monospace; }
#strat-summary blockquote { border-left: 3px solid #c0d0e0; margin: 0; padding-left: 12px; color: #666; }
#strat-summary ul { padding-left: 20px; }
#strat-summary li { margin-bottom: 4px; }
.math-block { background: #f6f8fb; border: 1px solid #e0e8f0; border-radius: 6px; padding: 10px 16px; margin: 10px 0; font-family: 'Cambria Math', 'Latin Modern Math', serif; font-size: 14px; overflow-x: auto; white-space: pre-wrap; color: #2a3a4a; }
.math-inline { font-family: 'Cambria Math', 'Latin Modern Math', serif; font-style: italic; color: #2a4a6a; background: #f0f4f8; padding: 1px 4px; border-radius: 3px; }

/* ── Loading state ── */
.loading { display: flex; align-items: center; justify-content: center;
  height: 100%; color: #888; font-size: 14px; }
</style>
</head>
<body>
<div id="root">

  <div id="sidebar">
    <div id="sb-header">
      因子库 OOS 展示
      <small>2012 年至今 · 商品期货 · 4bps</small>
    </div>
    <div class="nav-item active" id="nav-comparison" onclick="showView('comparison')">
      <span>📊</span> 曲线对比
    </div>
    <div class="nav-divider"></div>
    <div class="nav-section">各策略详情</div>
    <div id="strat-nav-list"></div>
  </div>

  <div id="main">
    <div class="view" id="view-comparison">
      <div id="charts-row">
        <div class="loading" id="cmp-loading">加载中…</div>
      </div>
    </div>
    <div class="view" id="view-strategy" style="display:none">
      <div id="strat-top">
        <div id="strat-title"></div>
        <div id="strat-stats"></div>
      </div>
      <div id="strat-chart-wrap">
        <canvas id="strat-chart"></canvas>
      </div>
      <div id="strat-summary-wrap">
        <div id="strat-summary"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Color palette ─────────────────────────────────────────────────────────────
const PALETTE = [
  '#4285f4','#e6a817','#34a853','#9c27b0','#00897b',
  '#e53935','#1976d2','#ef6c00','#558b2f','#6d4c41',
  '#d81b60','#00838f','#5e35b1','#43a047','#f4511e',
  '#0288d1','#8e24aa',
];
const EW_COLOR = '#c62828';

// ── State ─────────────────────────────────────────────────────────────────────
let metaFactors = [];
let colorMap = {};
let compBuilt = { '6m': false, '2y': false };
const chartState = {};   // id → {dates, series:[{name,color,data}], hidden:Set, paths}
const chartSel = { '6m': new Set(), '2y': new Set() };
const dataCache = {};

// ── Fetch helper ──────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  if (dataCache[url]) return dataCache[url];
  const r = await fetch(url);
  if (!r.ok) throw new Error(`fetch ${url} → ${r.status}`);
  const d = await r.json();
  dataCache[url] = d;
  return d;
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const meta = await fetchJSON('data/meta.json');
  metaFactors = meta.factors;
  metaFactors.forEach((f, i) => { colorMap[f.key] = PALETTE[i % PALETTE.length]; });
  colorMap['__ew__'] = EW_COLOR;
  buildSidebar();
  showView('comparison');
}

function buildSidebar() {
  const list = document.getElementById('strat-nav-list');
  for (const f of metaFactors) {
    const el = document.createElement('div');
    el.className = 'strat-nav';
    el.dataset.key = f.key;
    const sh = f.sharpe != null ? f.sharpe.toFixed(2) : '–';
    el.innerHTML = `<span class="sn-name" title="${f.display_name}">${f.display_name}</span>
                    <span class="sn-sharpe">${sh}</span>`;
    el.onclick = () => showView('strategy', f.key);
    list.appendChild(el);
  }
}

// ── View switching ────────────────────────────────────────────────────────────
function showView(view, key) {
  document.getElementById('view-comparison').style.display = view === 'comparison' ? 'flex' : 'none';
  document.getElementById('view-strategy').style.display   = view === 'strategy'   ? 'flex' : 'none';
  document.getElementById('nav-comparison').classList.toggle('active', view === 'comparison');
  document.querySelectorAll('.strat-nav').forEach(el =>
    el.classList.toggle('active', view === 'strategy' && el.dataset.key === key));

  if (view === 'comparison') buildComparisonCharts();
  else buildStratDetail(key);
}

// ── Canvas chart drawing (adapted from /mnt/Data/jiqiang/dashboard/gen.py) ────
const PAD = { top: 14, bottom: 36, left: 50, right: 12 };

function drawChart(id, hoverCol, highlightIdx) {
  const st = chartState[id];
  if (!st) return;
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const { dates, series, hidden } = st;
  const N = dates.length;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top  - PAD.bottom;

  // y range
  let yMin = Infinity, yMax = -Infinity;
  series.forEach((s, si) => {
    if (hidden.has(si)) return;
    for (const v of s.data) { if (v != null) { if (v < yMin) yMin = v; if (v > yMax) yMax = v; } }
  });
  if (!isFinite(yMin)) { yMin = 0; yMax = 2; }
  if (yMin === yMax) { yMin -= 0.1; yMax += 0.1; }
  const yPad = (yMax - yMin) * 0.08;
  yMin -= yPad; yMax += yPad;

  const xOf = i => PAD.left + plotW * i / Math.max(N - 1, 1);
  const yOf = v => PAD.top  + plotH * (1 - (v - yMin) / (yMax - yMin));

  // background + grid
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#eff2f5'; ctx.lineWidth = 0.5;
  const yTicks = 5;
  for (let i = 0; i <= yTicks; i++) {
    const y = PAD.top + plotH * i / yTicks;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
  }
  // zero line
  if (yMin < 1 && yMax > 1) {
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(PAD.left, yOf(1)); ctx.lineTo(W - PAD.right, yOf(1)); ctx.stroke();
    ctx.setLineDash([]);
  }

  // draw lines
  st.paths = [];
  series.forEach((s, si) => {
    if (hidden.has(si)) { st.paths.push(null); return; }
    const isHL  = (highlightIdx === si);
    const isEW  = s.name === '等权组合';
    const isFade = highlightIdx != null && highlightIdx >= 0 && !isHL;
    ctx.strokeStyle = s.color;
    ctx.lineWidth   = isHL ? 3.5 : (isEW ? 2.5 : 1.5);
    ctx.globalAlpha = isFade ? 0.06 : (isEW ? 0.95 : 0.5);
    if (isEW) { ctx.setLineDash([5, 4]); } else { ctx.setLineDash([]); }
    const pts = [];
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < N; i++) {
      if (s.data[i] == null) continue;
      const x = xOf(i), y = yOf(s.data[i]);
      pts.push({ x, y, i });
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1.0; ctx.setLineDash([]);
    st.paths.push(pts);
  });

  // y-axis labels
  ctx.fillStyle = '#888'; ctx.font = '10px -apple-system, sans-serif'; ctx.textAlign = 'right';
  for (let i = 0; i <= yTicks; i++) {
    const val = yMin + (yMax - yMin) * (1 - i / yTicks);
    ctx.fillText(val.toFixed(2), PAD.left - 4, PAD.top + plotH * i / yTicks + 4);
  }
  // x-axis labels — show years for long series (>3yr), month-day for short
  ctx.fillStyle = '#888'; ctx.textAlign = 'center';
  const spanYears = N > 0 ? (new Date(dates[N-1]) - new Date(dates[0])) / (365.25*86400000) : 0;
  if (spanYears > 3) {
    // year-based ticks: one label per Jan-1
    let lastYear = null;
    for (let i = 0; i < N; i++) {
      const yr = dates[i].slice(0, 4);
      if (yr !== lastYear) {
        lastYear = yr;
        ctx.fillText(yr, xOf(i), H - PAD.bottom + 16);
      }
    }
  } else {
    const xStep = Math.max(1, Math.floor(N / 7));
    for (let i = 0; i < N; i += xStep) {
      ctx.save(); ctx.translate(xOf(i), H - PAD.bottom + 14); ctx.rotate(-0.4);
      ctx.fillText(dates[i].slice(5), 0, 0); ctx.restore();
    }
    ctx.save(); ctx.translate(xOf(N - 1), H - PAD.bottom + 14); ctx.rotate(-0.4);
    ctx.fillText(dates[N - 1].slice(5), 0, 0); ctx.restore();
  }

  // crosshair + dots
  if (hoverCol != null && hoverCol >= 0 && hoverCol < N) {
    const hx = xOf(hoverCol);
    ctx.strokeStyle = '#999'; ctx.lineWidth = 0.8; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(hx, PAD.top); ctx.lineTo(hx, H - PAD.bottom); ctx.stroke();
    ctx.setLineDash([]);
    series.forEach((s, si) => {
      if (hidden.has(si) || s.data[hoverCol] == null) return;
      ctx.fillStyle = s.color;
      ctx.beginPath(); ctx.arc(hx, yOf(s.data[hoverCol]), 4.5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(hx, yOf(s.data[hoverCol]), 4.5, 0, Math.PI * 2); ctx.stroke();
    });
  }
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
function getOrCreateTooltip(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  const wrap = canvas.parentElement;
  let tip = wrap.querySelector('.chart-tooltip');
  if (!tip) {
    tip = document.createElement('div');
    tip.className = 'chart-tooltip';
    wrap.style.position = 'relative';
    wrap.appendChild(tip);
  }
  return tip;
}

function colFromMouseX(canvasId, mx) {
  const st = chartState[canvasId];
  if (!st) return -1;
  const canvas = document.getElementById(canvasId);
  if (!canvas) return -1;
  const N = st.dates.length;
  const W = canvas.clientWidth;
  const plotW = W - PAD.left - PAD.right;
  const col = Math.round((mx - PAD.left) / plotW * (N - 1));
  if (col < 0 || col >= N || mx < PAD.left || mx > W - PAD.right) return -1;
  return col;
}

function tooltipHtml(canvasId, col) {
  const st = chartState[canvasId];
  if (!st || col < 0) return null;
  const { dates, series, hidden } = st;
  const rows = [];
  series.forEach((s, si) => {
    if (hidden.has(si) || s.data[col] == null) return;
    rows.push({ name: s.name, val: s.data[col], color: s.color });
  });
  rows.sort((a, b) => b.val - a.val);
  if (!rows.length) return null;
  let html = `<div class="tt-date">${dates[col]}</div>`;
  for (const r of rows)
    html += `<div class="tt-row"><span class="tt-swatch" style="background:${r.color}"></span><span class="tt-name">${r.name}</span><span class="tt-val">${r.val.toFixed(3)}</span></div>`;
  return html;
}

function positionTooltip(tip, canvas, mx, my) {
  const wrap = canvas.parentElement;
  const cr = canvas.getBoundingClientRect();
  const wr = wrap.getBoundingClientRect();
  const tx = mx + cr.left - wr.left;
  const ty = my + cr.top  - wr.top;
  tip.style.top = Math.max(0, ty - 20) + 'px';
  if (tx + 220 < wr.width) { tip.style.left = (tx + 16) + 'px'; tip.style.right = 'auto'; }
  else                      { tip.style.left = 'auto'; tip.style.right = (wr.width - tx + 16) + 'px'; }
}

function bindChartEvents(canvasId, period) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const col = colFromMouseX(canvasId, mx);
    const tip = getOrCreateTooltip(canvasId);
    if (tip && !tip.classList.contains('pinned')) {
      const html = tooltipHtml(canvasId, col);
      if (html) { tip.innerHTML = html; tip.style.display = 'block'; positionTooltip(tip, canvas, mx, my); }
      else { tip.style.display = 'none'; }
    }
    drawChart(canvasId, col >= 0 ? col : null);
  });
  canvas.addEventListener('mouseleave', () => {
    const tip = getOrCreateTooltip(canvasId);
    if (tip && !tip.classList.contains('pinned')) tip.style.display = 'none';
    drawChart(canvasId, null);
  });
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const col = colFromMouseX(canvasId, e.clientX - rect.left);
    const tip = getOrCreateTooltip(canvasId);
    if (!tip) return;
    if (tip.classList.contains('pinned')) {
      tip.classList.remove('pinned'); tip.style.display = 'none'; drawChart(canvasId, null);
    } else if (col >= 0) {
      const html = tooltipHtml(canvasId, col);
      if (html) {
        tip.innerHTML = html; tip.style.display = 'block';
        positionTooltip(tip, canvas, e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
        tip.classList.add('pinned');
      }
    }
  });
}

// ── Comparison charts ─────────────────────────────────────────────────────────
async function buildComparisonCharts() {
  const row = document.getElementById('charts-row');
  if (compBuilt['6m'] && compBuilt['2y']) {
    // just resize
    ['chart-6m', 'chart-2y'].forEach(id => drawChart(id, null));
    return;
  }
  row.innerHTML = '';

  for (const [label, title] of [['6m', '最近 6 个月'], ['2y', '最近 2 年']]) {
    const wrap = document.createElement('div');
    wrap.className = 'chart-wrap';
    wrap.innerHTML = `
      <div class="chart-period-label">${title}</div>
      <div class="chart-canvas-wrap"><canvas id="chart-${label}" class="chart-canvas"></canvas></div>
      <div class="chart-legend" id="legend-${label}"></div>`;
    row.appendChild(wrap);
  }

  for (const label of ['6m', '2y']) {
    try {
      const d = await fetchJSON(`data/nav_${label}.json`);
      buildCompChart(`chart-${label}`, label, d);
      buildLegend(label);
      compBuilt[label] = true;
    } catch(e) {
      console.error(e);
    }
  }
}

function buildCompChart(canvasId, period, d) {
  const series = metaFactors.map(f => ({
    name: f.display_name,
    key: f.key,
    color: colorMap[f.key],
    data: d.factors[f.key] || [],
  }));
  series.push({ name: '等权组合', key: '__ew__', color: EW_COLOR, data: d.equal_weight });

  chartState[canvasId] = {
    dates: d.dates, series, hidden: new Set(), paths: [],
    selSet: chartSel[period], period,
  };
  bindChartEvents(canvasId, period);
  drawChart(canvasId, null);

  window.addEventListener('resize', () => drawChart(canvasId, null));
}

function buildLegend(period) {
  const wrap = document.getElementById(`legend-${period}`);
  if (!wrap) return;
  wrap.innerHTML = '';
  const canvasId = `chart-${period}`;
  const st = chartState[canvasId];
  if (!st) return;

  st.series.forEach((s, si) => {
    const el = document.createElement('div');
    el.className = 'leg-item';
    el.style.color = s.color;
    const dot = document.createElement('span');
    if (s.key === '__ew__') dot.className = 'leg-ew-line';
    else { dot.className = 'leg-dot'; dot.style.background = s.color; }
    const lbl = document.createElement('span');
    lbl.className = 'leg-label'; lbl.textContent = s.name;
    el.appendChild(dot); el.appendChild(lbl);

    el.addEventListener('mouseenter', () => {
      if (st.selSet.size > 0) return;
      drawChart(canvasId, null, si);
      el.classList.add('lit');
      wrap.querySelectorAll('.leg-item').forEach((e, i) => { if (i !== si) e.classList.add('dim'); });
    });
    el.addEventListener('mouseleave', () => {
      if (st.selSet.size > 0) return;
      drawChart(canvasId, null, null);
      wrap.querySelectorAll('.leg-item').forEach(e => e.classList.remove('lit', 'dim'));
    });
    el.addEventListener('click', () => {
      if (st.selSet.has(si)) st.selSet.delete(si); else st.selSet.add(si);
      refreshLegendSel(period);
      drawChart(canvasId, null, st.selSet.size === 1 ? [...st.selSet][0] : null);
    });
    wrap.appendChild(el);
  });
}

function refreshLegendSel(period) {
  const canvasId = `chart-${period}`;
  const st = chartState[canvasId];
  if (!st) return;
  const wrap = document.getElementById(`legend-${period}`);
  const items = wrap.querySelectorAll('.leg-item');
  items.forEach((el, i) => {
    const isSel = st.selSet.has(i);
    el.classList.toggle('sel', isSel);
    el.classList.toggle('dim', st.selSet.size > 0 && !isSel);
    el.classList.remove('lit');
    el.style.background  = isSel ? hexAlpha(st.series[i].color, 0.1) : '';
    el.style.borderColor = isSel ? hexAlpha(st.series[i].color, 0.5) : 'transparent';
  });
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Strategy detail ───────────────────────────────────────────────────────────
let _stratResizeHandler = null;
async function buildStratDetail(key) {
  const meta = metaFactors.find(f => f.key === key) || {};

  // 1. Immediately clear old content + show loading
  document.getElementById('strat-title').textContent = meta.display_name || key;
  const canvas = document.getElementById('strat-chart');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1);
    canvas.height = canvas.clientHeight * (window.devicePixelRatio || 1);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  document.getElementById('strat-summary').innerHTML = '<div class="loading">加载中…</div>';
  // Scroll back to top
  document.getElementById('view-strategy').scrollTop = 0;

  // 2. Stats cards (from meta, instant)
  const s = meta;
  const statsEl = document.getElementById('strat-stats');
  const items = [
    ['Sharpe',   s.sharpe   != null ? s.sharpe.toFixed(2)   : '–'],
    ['年化收益',   s.ann_ret  != null ? s.ann_ret + '%'        : '–'],
    ['年化波动',   s.ann_vol  != null ? s.ann_vol + '%'        : '–'],
    ['最大回撤',   s.max_dd   != null ? s.max_dd.toFixed(3)   : '–'],
    ['日胜率',    s.win_rate != null ? s.win_rate + '%'       : '–'],
    ['换手率',    s.turnover != null ? s.turnover + '%'       : '–'],
    ['NAV 终值',  s.final_nav != null ? s.final_nav.toFixed(2) : '–'],
  ];
  statsEl.innerHTML = items.map(([label, val]) =>
    `<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value">${val}</div></div>`
  ).join('');

  // 3. Fetch data then render chart + summary together
  try {
    const d = await fetchJSON(`data/${encodeURIComponent(key)}.json`);
    const color = colorMap[key] || '#4285f4';
    chartState['strat-chart'] = {
      dates: d.dates,
      series: [{ name: d.display_name, key, color, data: d.nav }],
      hidden: new Set(), paths: [],
    };
    drawChart('strat-chart', null);
    if (_stratResizeHandler) window.removeEventListener('resize', _stratResizeHandler);
    _stratResizeHandler = () => drawChart('strat-chart', null);
    window.addEventListener('resize', _stratResizeHandler);
    bindChartEvents('strat-chart', null);

    // summary — render after a microtask so chart paints first
    const summaryEl = document.getElementById('strat-summary');
    const rawMd = d.summary || '';
    requestAnimationFrame(() => {
      summaryEl.innerHTML = mdToHtml(filterSummary(rawMd));
    });
  } catch(e) {
    console.error(e);
    document.getElementById('strat-summary').innerHTML = '<div class="loading">加载失败</div>';
  }
}

// ── Markdown renderer with LaTeX + table support ──────────────────────────────
function mdToHtml(md) {
  // 1. Extract LaTeX BEFORE html-escaping (backslashes would be mangled)
  const latexBlocks = [];
  function renderTex(tex, displayMode) {
    if (typeof katex !== 'undefined') {
      try { return katex.renderToString(tex.trim(), { displayMode, throwOnError: false }); }
      catch(e) { /* fallback below */ }
    }
    // Fallback: styled raw LaTeX
    const tag = displayMode ? 'div' : 'span';
    const cls = displayMode ? 'math-block' : 'math-inline';
    return `<${tag} class="${cls}">${tex.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</${tag}>`;
  }
  md = md.replace(/\$\$([\s\S]*?)\$\$/g, (_, tex) => {
    latexBlocks.push(renderTex(tex, true));
    return '\x01L' + (latexBlocks.length - 1) + '\x01';
  });
  md = md.replace(/\$([^$\n]+?)\$/g, (_, tex) => {
    latexBlocks.push(renderTex(tex, false));
    return '\x01L' + (latexBlocks.length - 1) + '\x01';
  });

  // 2. Convert markdown tables to HTML tables
  md = md.replace(/((?:^\|.+\|[ \t]*\n?)+)/gm, function(block) {
    const rows = block.trim().split('\n').filter(r => r.trim());
    if (rows.length < 2) return block;
    const isSep = /^[\s|:-]+$/.test(rows[1].replace(/[^|:\-\s]/g, ''));
    const dataRows = isSep ? [rows[0], ...rows.slice(2)] : rows;
    let html = '<table>';
    dataRows.forEach((row, ri) => {
      const cells = row.replace(/^\|/, '').replace(/\|$/, '').split('|');
      const tag = (ri === 0 && isSep) ? 'th' : 'td';
      html += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
    });
    return html + '</table>\n';
  });

  // 3. Escape HTML (protect table tags + latex placeholders)
  md = md.replace(/<(\/?(?:table|tr|th|td)>)/g, '\x02$1');
  md = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  md = md.replace(/\x02/g, '<');

  // 4. Restore LaTeX
  md = md.replace(/\x01L(\d+)\x01/g, (_, i) => latexBlocks[+i]);

  // 5. Standard markdown
  return md
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/^(?!<[h1-6bctdulp])(.+)$/gm, '$1')
    .replace(/^/m, '<p>') + '</p>';
}

function filterSummary(md) {
  const KEEP = ['策略概述', '数学公式', '回测表现', '参数', '迭代记录', '适用说明'];
  const lines = md.split('\n');
  const out = [];
  let keep = true;
  let inCode = false;
  for (const line of lines) {
    if (/^```/.test(line)) { inCode = !inCode; continue; }
    if (inCode) continue;
    if (/^# (?!#)/.test(line))          { out.push(line); keep = true; }
    else if (/^[*][*]Sharpe/.test(line)) { out.push(line); }
    else if (/^## /.test(line)) {
      const title = line.replace(/^## [0-9]*[.]?[ \t]*/, '');
      keep = KEEP.some(s => title.includes(s));
      if (keep) out.push(line);
    } else if (keep) out.push(line);
  }
  return out.join('\n');
}

// ── Start ─────────────────────────────────────────────────────────────────────
// Wait for KaTeX to load before init (it has defer attribute)
function startApp() { init().catch(e => console.error('init failed:', e)); }
if (typeof katex !== 'undefined') startApp();
else document.querySelector('script[src*="katex"]'
  ).addEventListener('load', startApp);
</script>
